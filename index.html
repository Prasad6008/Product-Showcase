<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=DM+Sans:wght@400;800&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Glow ── */
    .product-glow {
      position: absolute;
      width: 550px;
      height: 550px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.7;
      z-index: 1;
      pointer-events: none;
      background-color: rgba(220, 60, 120, 0.9);
      transition: background-color 0.5s ease;
    }

    /* ── Container ── */
    .showcase_container {
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 130px;
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 520px;
      background:linear-gradient(179deg,rgba(189, 55, 146, 1) 0%, rgba(0, 0, 0, 1) 100%);;
      background-size: cover;
      background-position: center;
      transition: background-color 0.4s ease;
      height:100vh;
    }

    /* ── Flash overlay ── */
    .bg-flash {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0s;
    }
    .bg-flash.flash {
      animation: flashEffect 0.6s ease forwards;
    }
    @keyframes flashEffect {
      0%   { opacity: 0; }
      25%  { opacity: 0.30; }
      100% { opacity: 0; }
    }

    /* ── Typography ── */
    .showcase_italic {
      font-family: "Elms Sans", sans-serif;
      font-style: italic;
      color: white;
      font-size: 65px;
      word-spacing: -10px;
      font-weight: 200;
      z-index: 2;
      line-height: 1;
    }
    .showcase_bold {
      font-family: "Elms Sans", sans-serif;
      font-style: normal;
      color: white;
      font-size: 65px;
      font-weight: 900;
      word-spacing: -10px;
      line-height: 1;
    }
    .showcase_description {
      font-family: "Elms Sans", sans-serif;
      color: white;
      font-size: 17px;
      margin-top: 20px;
      word-spacing: -2px;
      width: 550px;
      line-height: 1.5;
    }
    .product_name {
      font-family: "Elms Sans", sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.05em;
    }

    /* ── Layout rows ── */
    .showcase_row_1 { line-height: 40px; }
    .showcase_row_2 { line-height: 20px; overflow: visible; z-index: 1; }
    .showcase_row_3 {
      border: 1px solid rgba(255,255,255,0.2);
      margin-top: 20px;
      padding: 5px;
      border-radius: 7px;
      width: 500px;
      position: relative;
      overflow: visible;
    }

    /* ── Track lines ── */
    .track-line {
      position: absolute;
      width: 3px;
      height: 48px;
      background: rgba(255,255,255,0.9);
      border-radius: 3px;
      top: 5px;
      transition: top 0.45s cubic-bezier(0.22,1,0.36,1),
                  height 0.45s cubic-bezier(0.22,1,0.36,1);
      z-index: 10;
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
    }
    .track-line--left  { left:  -2px; }
    .track-line--right { right: -2.5px; }

    /* ── Buttons ── */
    .showcase_row_3 .row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      color: white;
      font-weight: 800;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      position: relative;
      overflow: hidden;
      transition: border-color 0.5s ease;
    }
    .showcase_row_3 .row::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 0;
    }
    .showcase_row_3 .row span { position: relative; z-index: 1; }

    .showcase_row_3 .row[data-product="strawberry"]::before {
      background: linear-gradient(to right, rgba(223, 40, 180, 0.85), rgba(180,30,80,0));
    }
    .showcase_row_3 .row[data-product="mango"]::before {
      background: linear-gradient(to right, rgba(251, 178, 1, 0.85), rgba(30,100,50,0));
    }
    .showcase_row_3 .row[data-product="matcha"]::before {
      background: linear-gradient(to right, rgba(87, 193, 135, 0.85), rgba(255,255,255,0));
    }
    .showcase_row_3 .row[data-product="brown"]::before {
      background: linear-gradient(to right, rgba(238, 158, 103, 0.85), rgba(120,60,20,0));
    }
    .showcase_row_3 .row.active::before { opacity: 1; }

    /* Arrow */
    .showcase_row_3 .arrow {
      opacity: 0;
      transform: translateX(15px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .showcase_row_3 .row:hover .arrow { opacity: 1; transform: translateX(0); }
    .showcase_row_3 .row.active .arrow { opacity: 1 !important; transform: translateX(0) !important; }

    /* ── Columns ── */
    .showcase_col_1 { position: relative; z-index: 3; }
    .showcase_col_2 {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 450px;
      min-width: 450px;
      z-index: 1;
      perspective: 1000px;
    }

    /* ── Product image ── */
    .product-img {
      position: absolute;
      opacity: 0;
      transform: scaleY(0);
      transform-origin: center center;
      pointer-events: none;
      transition: none;
      z-index: 3;
      width: 500px;
      height: 600px;
      object-fit: contain;
    }
    .product-img.active {
      opacity: 1;
      pointer-events: auto;
      animation: eyeOpen 1s cubic-bezier(0.22,1,0.36,1) forwards;
      cursor: pointer !important;
    }
    .product-img.closing {
      animation: eyeClose 0.25s cubic-bezier(0.55,0,1,0.45) forwards;
    }
    @keyframes eyeOpen {
      0%   { opacity: 0.6; transform: scaleY(0); }
      40%  { opacity: 1;   transform: scaleY(1.05); }
      70%  { transform: scaleY(0.97); }
      100% { opacity: 1;   transform: scaleY(1); }
    }
    @keyframes eyeClose {
      0%   { opacity: 1; transform: scaleY(1); }
      100% { opacity: 0; transform: scaleY(0); }
    }
    .product-img.active,
    .fruit-layer.active .fruit {
      transition: transform 0.4s ease-out;
      will-change: transform;
    }

    /* ── Fruit layers ── */
    .fruit-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .fruit-layer.active { opacity: 1; }
    .fruit {
      position: absolute;
      object-fit: contain;
      max-width: none !important;
      max-height: none !important;
    }
    .fruit-top-left     { top: -90px;  left: -170px;   z-index: 2; }
    .fruit-top-right    { top: 0px;    right: -100px; }
    .fruit-bottom-right { bottom: -80px; right: 30px;  z-index: 4; }
    .fruit-top-left-left{ top: -10px;  left: -750px;  z-index: 2; }
    .fruit-top-left-mango { top: -60px;  left: -100px;  z-index: 2; }
    .fruit-top-left-matcha { top: -60px;  left: -160px;  z-index: 2; }
    .fruit-top-left-brown { top: -250px;  left: -160px;  z-index: 2; }

    /* ── Placeholder product cards (no real images) ── */
    .product-placeholder {
      width: 220px;
      height: 320px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .showcase_container { gap: 30px; padding: 30px; }
      .showcase_row_3 { width: 380px; margin-top: 10px; }
      .showcase_description { width: 380px; margin-top: 1px; }
      .showcase_bold { margin-top: -10px; }
      .showcase_col_2 { min-height: 350px; min-width: 350px; }
      .product-img { width: 150px !important; height: 150px !important; }
      .product-glow { width: 300px; height: 300px; }
      
    }
    @media (max-width: 768px) {
      .showcase_container {
        flex-direction: column;
        padding: 20px;
        gap: 0;
        align-items: center;
      }
      .showcase_col_1 { width: 100%; order: 2; }
      .showcase_col_2 {
        width: 100%;
        order: 1;
        min-height: 280px;
        min-width: unset;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .product-img { width: 260px !important; height: 260px !important; }
      .product-glow { width: 220px; height: 220px; filter: blur(50px); }
      .showcase_row_3 { width: 100%; }
      .showcase_description { width: 100%; }
      .showcase_italic, .showcase_bold { font-size: 28px; }
      .fruit-top-left-left { display: none; }
      .fruit-top-left  { top: -20px; left: -10px; }
      .fruit-top-right { top: 0;     right: -20px; }
      .fruit-bottom-right { bottom: -10px; right: 10px; }
    }
    @media (max-width: 480px) {
      .showcase_italic, .showcase_bold { font-size: 22px; }
      .product-img { width: 300px !important; height: 300px !important; }
      .showcase_row_3 .row { padding: 10px 12px; font-size: 12px; }
      .fruit-top-left{ top: -50px !important;  left: -50px !important;   z-index: 2;width: 200px !important; }
      .showcase_description {font-size: 12px;}
      .showcase_bold{ word-spacing:-6px;}
      .product_name { font-size: 14px; }
      .showcase_container { gap: 90px; padding: 30px;height: 100vh; }
      .showcase_bold { margin-top: 5px;margin-bottom: 10px;}
      .fruit-top-right { top: 0;     right: -50px; }
      .fruit-bottom-right { bottom: -10px; right: 10px; }
      .fruit-top-left-left{ top: -10px;  left: 10px;  z-index: 2;width:800px !important; }
      .fruit-top-left-mango { top: -40px;  left: -50px;  z-index: 2; width:500px !important}
      .fruit-top-left-matcha { top: 20px;  left: -50px;  z-index: 2; width:300px !important}
      .fruit-top-left-brown { top: -120px;  left: -30px;  z-index: 2; width: 350px !important;}
      .brown-top-right { top: 20px; right: -30px; width: 70px !important;}
      .brown-bottom-right { bottom: -20px; right: -30px; width: 130px !important;}
      
    }
  </style>
</head>
<body>

<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  CONFIGURATION — swap these values to customise         ║
  ╚══════════════════════════════════════════════════════════╝

  PRODUCT IMAGES  →  replace the src="" on every .product-img
  FRUIT IMAGES    →  replace the src="" on every .fruit img
  BG IMAGES       →  add data-bg-*-image="url(...)" values
  COLORS          →  edit the data-bg-*-color attributes
  TEXTS           →  edit the data-title-* and data-desc-* attributes
  URLS            →  edit data-url="" on each .product-img
-->

<div class="showcase_container"
  style="
    background: linear-gradient(179deg,rgba(189, 55, 146, 1) 0%, rgba(0, 0, 0, 1) 100%);
    background-size: cover;
    background-position: center;
    transition: background-color 0.4s ease;
  "

  data-bg-strawberry-color="linear-gradient(179deg,rgba(189, 55, 146, 1) 0%, rgba(0, 0, 0, 1) 100%)"
  data-bg-strawberry-image=""
  data-bg-mango-color="linear-gradient(179deg,rgba(246, 176, 0, 1) 0%, rgba(0, 0, 0, 1) 100%)"
  data-bg-mango-image=""
  data-bg-matcha-color="linear-gradient(179deg,rgba(82, 188, 133, 1) 0%, rgba(0, 0, 0, 1) 100%)"
  data-bg-matcha-image=""
  data-bg-brown-color="linear-gradient(179deg,rgba(231, 155, 99, 1) 0%, rgba(0, 0, 0, 1) 100%)"
  data-bg-brown-image=""

  data-title-italic-strawberry="Bobabam. Instant"
  data-title-bold-strawberry="Boba Drink Kit"
  data-desc-strawberry="Satisfy your top obsession with the range of new arrivals. Handpicked strawberries, premium tapioca pearls — just add water."

  data-title-italic-mango="Bobabam. Jack Fruit"
  data-title-bold-mango="Jack Fruit Drink Kit"
  data-desc-mango="Tropical, bold, irresistible. Our Jack Fruit boba kit delivers the real thing in every sip."

  data-title-italic-matcha="Bobabam. Ripe Banana"
  data-title-bold-matcha="Ripe Banana Drink Kit"
  data-desc-matcha="Creamy, smooth, perfectly ripe. Our banana boba kit is the ultimate comfort drink."

  data-title-italic-brown="Bobabam. Tapioca"
  data-title-bold-brown="Cassava Chips Chilly"
  data-desc-brown="Crispy, spicy, addictive. Our cassava chips with a chilli kick — snacking reimagined."
>

  <div class="bg-flash"></div>

  <!-- ── LEFT COLUMN ── -->
  <div class="showcase_col_1">

    <div class="showcase_row_1">
      <h1 class="showcase_italic" id="showcase-title-italic">Bobabam. Instant</h1>
      <h1 class="showcase_bold"   id="showcase-title-bold">Boba Drink Kit</h1>
    </div>

    <div class="showcase_row_2">
      <p class="showcase_description" id="showcase-desc">
        Satisfy your top obsession with the range of new arrivals
      </p>
    </div>

    <div class="showcase_row_3">
      <!-- Side track lines -->
      <div class="track-line track-line--left"></div>
      <div class="track-line track-line--right"></div>

      <button class="row active button1" data-product="strawberry"
        style="border-top-left-radius:7px;border-top-right-radius:7px;">
        <span class="product_name">STRAWBERRY</span>
        <span class="arrow">⟶</span>
      </button>

      <button class="row" data-product="mango">
        <span class="product_name">MANGO</span>
        <span class="arrow">⟶</span>
      </button>

      <button class="row" data-product="matcha">
        <span class="product_name">MATCHA</span>
        <span class="arrow">⟶</span>
      </button>

      <button class="row button4" data-product="brown"
        style="border-bottom-left-radius:7px;border-bottom-right-radius:7px;">
        <span class="product_name">BROWN SUGAR</span>
        <span class="arrow">⟶</span>
      </button>
    </div>
  </div>

  <!-- ── RIGHT COLUMN ── -->
  <div class="showcase_col_2">

    <!-- Fruit decoration layers -->
    <!-- Replace src="" with your actual fruit image URLs -->

    <div class="fruit-layer active" data-product="strawberry">
      <img class="fruit fruit-top-left fruit-opposite" style="transform:rotate(-15deg)" src="assets/st1.png" alt="" width="300">
      <img class="fruit fruit-top-right"               style="transform:rotate(10deg)"  src="assets/straw1.avif" alt="" width="100">
      <img class="fruit fruit-bottom-right"            style="transform:rotate(-5deg)"  src="assets/straw2.avif" alt="" width="130">
      <img class="fruit fruit-top-left-left"                                             src="assets/straw1.avif" alt="" width="130">
    </div>

    <div class="fruit-layer" data-product="mango">
      <img class="fruit fruit-top-left-mango fruit-opposite" style="transform:rotate(-15deg)" src="assets/mango1.png" alt="" width="800">
      <img class="fruit fruit-top-right"               style="transform:rotate(10deg)"  src="" alt="" width="100">
      <img class="fruit fruit-bottom-right"            style="transform:rotate(-5deg)"  src="assets/mango4.avif" alt="" width="130">
      <img class="fruit fruit-top-left-left"                                             src="assets/mango4.avif" alt="" width="130">
    </div>

    <div class="fruit-layer" data-product="matcha">
      <img class="fruit fruit-top-left-matcha fruit-opposite" src="assets/matcha.png" alt="" width="500">
      <img class="fruit fruit-top-right"               src="assets/leaf2.png" alt="" width="100">
      <img class="fruit fruit-bottom-right"            src="assets/leaf4.png" alt="" width="160">
      <img class="fruit fruit-top-left-left"           src="assets/leaf2.png" alt="" width="130">
    </div>

    <div class="fruit-layer" data-product="brown">
      <img class="fruit fruit-top-left-brown fruit-opposite" src="assets/brown1.png" alt="" width="600">
      <img class="fruit fruit-top-right brown-top-right"               src="assets/brownsugar.png" alt="" width="150">
      <img class="fruit fruit-bottom-right brown-bottom-right"            src="assets/brownsugar.png" alt="" width="200">
      <img class="fruit fruit-top-left-left brown-top-left-left"           src="assets/brownsugar.png" alt="" width="130">
    </div>

    <!--
      Product images — replace src="" with your product image URLs.
      Replace data-url="" with the product page link.
    -->
    <img class="product-img active"
         data-product="strawberry"
         src="assets/box1.png"
         alt="Ultra Thin Boba"
         width="250" height="350">

    <div class="product-glow" id="product-glow"></div>

    <img class="product-img"
         data-product="mango"
         src="assets/box2.png"
         alt="Jack Fruit Boba">

    <img class="product-img"
         data-product="matcha"
         src="assets/box3.png"
         alt="Ripe Banana Boba">

    <img class="product-img"
         data-product="brown"
         src="assets/box4.png"
         alt="Cassava Chips Chilly">

    <!--
      ── DEMO PLACEHOLDERS ──────────────────────────────────
      Shown only when product images have no src.
      Remove this block once you add real images above.
    -->
    <!-- <div class="product-placeholder active demo-placeholder" data-product="strawberry"
      style="background:linear-gradient(135deg,#e84c9b,#7a0d4e);position:absolute;z-index:3;">🍓</div>
    <div class="product-placeholder demo-placeholder" data-product="mango"
      style="background:linear-gradient(135deg,#2d8f4e,#0d4e20);position:absolute;z-index:3;">🍈</div>
    <div class="product-placeholder demo-placeholder" data-product="matcha"
      style="background:linear-gradient(135deg,#b0b0b0,#3a3a3a);position:absolute;z-index:3;">🍌</div>
    <div class="product-placeholder demo-placeholder" data-product="brown"
      style="background:linear-gradient(135deg,#6bb8f0,#1a3a5c);position:absolute;z-index:3;">🥨</div> -->

  </div>
</div>

<script>
  // ── Click: product image → go to URL ───────────────────────
  document.querySelectorAll('.product-img').forEach(function(img) {
    img.addEventListener('click', function() {
      var url = this.dataset.url;
      if (url) window.location.href = url;
    });
  });

  // ── Helpers ────────────────────────────────────────────────
  function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  var container = document.querySelector('.showcase_container');
  var glow      = document.getElementById('product-glow');

  var glowColors = {
    strawberry: 'rgba(201, 74, 161, 0.85)',
    mango:      'rgba(246, 178, 0, 0.9)',
    matcha:     'rgba(86, 194, 136, 0.99)',
    brown:      'rgba(225, 150, 102, 0.9)'
  };

  // Default glow on load
  glow.style.backgroundColor = glowColors['strawberry'];

  // ── Demo placeholders: mimic product-img active class ──────
  function syncDemoPlaceholders(product) {
    document.querySelectorAll('.demo-placeholder').forEach(function(el) {
      el.classList.remove('active');
      el.style.opacity = '0';
      el.style.transform = 'scaleY(0)';
      el.style.transition = 'none';
    });
    var target = document.querySelector('.demo-placeholder[data-product="' + product + '"]');
    if (!target) return;
    setTimeout(function() {
      target.style.transition = 'opacity 0.3s ease, transform 0.4s cubic-bezier(0.22,1,0.36,1)';
      target.style.opacity  = '1';
      target.style.transform = 'scaleY(1)';
      target.classList.add('active');
    }, 30);
  }
  // Initial state
  syncDemoPlaceholders('strawberry');

  // ── Button click ───────────────────────────────────────────
  document.querySelectorAll('.row').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var product = this.dataset.product;
      var flash   = document.querySelector('.bg-flash');

      // Active tab
      document.querySelectorAll('.row').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');

      // Track lines
      var btnHeight = this.offsetHeight;
      var newTop    = this.offsetTop;
      document.querySelector('.track-line--left').style.top    = newTop + 'px';
      document.querySelector('.track-line--right').style.top   = newTop + 'px';
      document.querySelector('.track-line--left').style.height  = btnHeight + 'px';
      document.querySelector('.track-line--right').style.height = btnHeight + 'px';

      // Product images
      document.querySelectorAll('.product-img').forEach(function(img) {
        img.classList.remove('active');
        img.style.animation = '';
      });
      setTimeout(function() {
        var target = document.querySelector('.product-img[data-product="' + product + '"]');
        if (target) target.classList.add('active');
      }, 20);

      // Demo placeholders
      syncDemoPlaceholders(product);

      // Fruit layers
      document.querySelectorAll('.fruit-layer').forEach(function(l) { l.classList.remove('active'); });
      var fruitLayer = document.querySelector('.fruit-layer[data-product="' + product + '"]');
      if (fruitLayer) fruitLayer.classList.add('active');

      // Glow
      glow.style.backgroundColor = glowColors[product] || glowColors['strawberry'];

      // Flash + background swap
      flash.classList.remove('flash');
      void flash.offsetWidth; // reflow
      setTimeout(function() {
        var bgColor = container.dataset['bg' + capitalize(product) + 'Color'];
        var bgImage = container.dataset['bg' + capitalize(product) + 'Image'];
        if (bgImage) {
          container.style.background = 'url(' + bgImage + ') center/cover no-repeat';
        } else if (bgColor) {
          container.style.background = bgColor;
        }
      }, 200);
      flash.classList.add('flash');

      // Text swap
    });
  });

  // ── Release eyeOpen animation lock ─────────────────────────
  document.querySelectorAll('.product-img').forEach(function(img) {
    img.addEventListener('animationend', function() {
      this.style.animation   = 'none';
      this.style.transform   = 'scaleY(1)';
    });
  });

  // ── Mouse move parallax ─────────────────────────────────────
  container.addEventListener('mousemove', function(e) {
    if (window.innerWidth <= 768) return;
    var rect = container.getBoundingClientRect();
    var x = (e.clientX - rect.left  - rect.width  / 2) / (rect.width  / 2);
    var y = (e.clientY - rect.top   - rect.height / 2) / (rect.height / 2);

    var activeImg = document.querySelector('.product-img.active');
    if (activeImg) {
      activeImg.style.transform =
        'scaleY(1) translate(' + (-x * 25) + 'px, ' + (-y * 10) + 'px)';
    }

    // Also move demo placeholder on parallax
    var activeDemo = document.querySelector('.demo-placeholder.active');
    if (activeDemo) {
      activeDemo.style.transform =
        'scaleY(1) translate(' + (-x * 25) + 'px, ' + (-y * 10) + 'px)';
    }

    document.querySelectorAll('.fruit-layer.active .fruit').forEach(function(fruit, i) {
      var speed = (i === 0) ? 80 : (i === 1) ? 60 : 70;
      var baseRotate = fruit.style.transform.match(/rotate\([^)]+\)/)
        ? fruit.style.transform.match(/rotate\([^)]+\)/)[0] : '';
      var dir = fruit.classList.contains('fruit-opposite') ? -1 : 1;
      fruit.style.transform =
        baseRotate + ' translate(' + (dir * x * speed) + 'px, ' + (dir * y * speed * 0.6) + 'px)';
    });
  });

  // ── Mouse leave: reset positions ───────────────────────────
  container.addEventListener('mouseleave', function() {
    if (window.innerWidth <= 768) return;

    var activeImg = document.querySelector('.product-img.active');
    if (activeImg) activeImg.style.transform = 'scaleY(1)';

    var activeDemo = document.querySelector('.demo-placeholder.active');
    if (activeDemo) activeDemo.style.transform = 'scaleY(1)';

    document.querySelectorAll('.fruit-layer.active .fruit').forEach(function(fruit) {
      var baseRotate = fruit.style.transform.match(/rotate\([^)]+\)/)
        ? fruit.style.transform.match(/rotate\([^)]+\)/)[0] : '';
      fruit.style.transform = baseRotate;
    });
  });
</script>
</body>
</html>
